<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Career Guide · Senior Infrastructure Engineer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0a0e17;--surface:#111827;--surface2:#0a0e17;--border:#1e293b;--text:#e2e8f0;--text2:#cbd5e1;--text3:#94a3b8;--text4:#64748b;--text5:#475569;--green:#00ff88;--blue:#00d4ff;--red:#ff6b6b;--yellow:#ffd93d;--purple:#c084fc;--link:#60a5fa;--font:'Outfit',sans-serif;--mono:'JetBrains Mono','Fira Code',monospace}
body{background:var(--bg);color:var(--text);font-family:var(--font);line-height:1.6;min-height:100vh}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
@keyframes slideIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes glow{0%,100%{box-shadow:0 0 15px rgba(0,255,136,.12)}50%{box-shadow:0 0 30px rgba(0,255,136,.25)}}

/* ═══ HEADER ═══ */
.header{background:linear-gradient(180deg,#0f172a,var(--bg));border-bottom:1px solid var(--border);padding:24px 20px 18px;position:sticky;top:0;z-index:100;backdrop-filter:blur(12px)}
.header-inner{max-width:860px;margin:0 auto}
.header-top{display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:10px}
.header-tag{font-family:var(--mono);color:var(--green);font-size:10px;letter-spacing:3px;font-weight:600;margin-bottom:3px}
.header h1{font-size:20px;font-weight:800;color:#f8fafc;letter-spacing:-.5px}
.header-sub{color:var(--text5);font-size:12px;margin-top:2px;font-family:var(--mono)}
.header-actions{display:flex;gap:6px;align-items:center;flex-wrap:wrap}
.saving-indicator{color:var(--yellow);font-size:10px;font-family:var(--mono);animation:pulse 1s infinite}
.btn-icon{background:transparent;border:1px solid #334155;color:var(--text3);padding:5px 10px;border-radius:5px;font-size:11px;cursor:pointer;font-family:var(--mono);transition:background .15s}
.btn-icon:hover{background:var(--border)}
.btn-reset{background:transparent;border:1px solid #ef444433;color:#ef4444;padding:5px 10px;border-radius:5px;font-size:10px;cursor:pointer;font-family:var(--mono);transition:background .15s}
.btn-reset:hover{background:#ef444411}
.progress-bar-wrap{margin-top:14px}
.progress-labels{display:flex;justify-content:space-between;margin-bottom:5px;font-family:var(--mono);font-size:11px}
.progress-label-left{color:var(--text5)}
.progress-label-right{color:var(--green);font-weight:600}
.progress-track{height:5px;background:var(--border);border-radius:3px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--green),var(--blue));border-radius:3px;transition:width .5s ease}
.progress-fill.glowing{animation:glow 3s infinite}

/* ═══ STATS ═══ */
.stats-panel{max-width:860px;margin:0 auto;padding:14px 20px 0;animation:slideIn .25s ease}
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:8px}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:10px 12px;cursor:pointer;transition:border-color .2s}
.stat-card:hover{border-color:#334155}
.stat-card.complete{border-color:color-mix(in srgb,var(--phase-color) 35%,transparent)}
.stat-phase{font-size:9px;font-family:var(--mono);font-weight:600;letter-spacing:1px}
.stat-pct{font-size:22px;font-weight:800;color:#f8fafc;margin:2px 0}
.stat-count{font-size:10px;color:var(--text5);font-family:var(--mono)}
.stat-bar{height:2px;background:var(--border);border-radius:1px;margin-top:6px;overflow:hidden}
.stat-bar-fill{height:100%;border-radius:1px;transition:width .4s}

/* ═══ TABS ═══ */
.tabs{max-width:860px;margin:0 auto;padding:14px 20px 0;display:flex;gap:4px;overflow-x:auto}
.tab{background:transparent;border:1px solid var(--border);border-bottom:1px solid var(--border);color:var(--text4);padding:7px 12px;border-radius:7px 7px 0 0;font-size:11px;font-weight:400;cursor:pointer;font-family:var(--mono);white-space:nowrap;transition:all .15s}
.tab:hover{background:var(--border)}
.tab.active{background:var(--surface);font-weight:700;border-bottom:2px solid currentColor}
.tab .tab-pct{margin-left:5px;opacity:.5;font-size:9px}

/* ═══ CONTENT ═══ */
.content{max-width:860px;margin:0 auto;padding:0 20px 40px}
.phase-banner{background:var(--surface);border-radius:0 8px 8px 8px;padding:16px 20px;margin-bottom:12px}
.phase-banner-inner{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:6px}
.phase-title{font-size:16px;font-weight:800;letter-spacing:.5px}
.phase-sub{color:var(--text4);font-size:12px;margin-top:1px}
.phase-badge{padding:4px 12px;border-radius:16px;font-family:var(--mono);font-size:11px;font-weight:600}

/* ═══ MODULES ═══ */
.module{background:var(--surface);border:1px solid var(--border);border-radius:8px;margin-bottom:8px;overflow:hidden;transition:border-color .3s}
.module.complete{border-color:color-mix(in srgb,var(--phase-color) 25%,transparent)}
.module-header{width:100%;background:transparent;border:none;color:var(--text);padding:14px 16px;cursor:pointer;text-align:left;display:flex;align-items:center;gap:12px;transition:background .15s;font-family:var(--font)}
.module-header:hover{background:var(--border)}
.module-icon{font-size:22px;flex-shrink:0}
.module-info{flex:1;min-width:0}
.module-top{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:4px}
.module-name{font-weight:700;font-size:14px}
.module-weeks{color:var(--text5);font-size:11px;font-family:var(--mono);margin-left:8px}
.module-progress{font-family:var(--mono);font-size:11px;font-weight:600}
.module-arrow{transition:transform .2s;color:var(--text5);font-size:10px;margin-left:8px}
.module-arrow.open{transform:rotate(180deg)}
.module-bar{height:2px;background:var(--surface2);border-radius:1px;margin-top:8px;overflow:hidden}
.module-bar-fill{height:100%;border-radius:1px;transition:width .4s}

/* ═══ EXPANDED ═══ */
.module-body{padding:0 16px 16px;animation:slideIn .2s ease}
.mark-all-row{display:flex;justify-content:flex-end;margin-bottom:8px}
.btn-mark-all{background:transparent;padding:3px 10px;border-radius:4px;font-size:10px;cursor:pointer;font-family:var(--mono);transition:background .15s}
.btn-mark-all:hover{background:var(--surface2)}

.section-box{background:var(--surface2);border-radius:6px;padding:10px 14px;margin-bottom:10px}
.section-label{font-size:10px;font-family:var(--mono);font-weight:600;margin-bottom:8px;letter-spacing:1.5px}

.topic-row{display:flex;align-items:flex-start;gap:9px;padding:7px 4px;border-radius:4px;cursor:pointer;transition:all .15s;user-select:none}
.topic-row:hover{background:var(--surface)}
.topic-row.done{opacity:.5}
.checkbox{min-width:18px;height:18px;border-radius:3px;border:1.5px solid #334155;display:flex;align-items:center;justify-content:center;margin-top:1px;flex-shrink:0;transition:all .15s}
.checkbox.checked{border-color:var(--green);background:#00ff8818}
.checkbox.checked::after{content:"✓";color:var(--green);font-size:11px;font-weight:800}
.topic-text{font-size:12.5px;line-height:1.5}
.topic-text.done{text-decoration:line-through;color:var(--text5)}

.resources-box{border-left:2px solid color-mix(in srgb,var(--phase-color) 20%,transparent)}
.resource-link{display:block;margin-bottom:5px}
.resource-link a{color:var(--link);text-decoration:none;font-size:12px;transition:color .15s}
.resource-link a:hover{color:#93c5fd}
.resource-arrow{color:#334155;margin-right:6px}

.project-box{border-left:2px solid #00ff8833}
.project-text{font-size:12.5px;line-height:1.55;color:var(--text3)}

/* ═══ FOOTER ═══ */
.footer{text-align:center;padding:28px 0 8px;margin-top:24px}
.footer-text{font-family:var(--mono);font-size:10px;color:var(--border)}

/* ═══ LOADING ═══ */
.loading{min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--bg);color:var(--green);font-family:var(--mono)}
.loading-icon{font-size:32px;margin-bottom:12px;animation:pulse 1.5s infinite}

@media(max-width:600px){
  .header h1{font-size:17px}
  .stats-grid{grid-template-columns:repeat(auto-fit,minmax(100px,1fr))}
  .module-weeks{display:none}
}
</style>
</head>

// ═══════════════════════════════════════
// STATE
// ═══════════════════════════════════════
let completed = {};
let activePhase = "p1";
let expandedModule = null;
let showStats = false;

const allTopicIds = [];
PHASES.forEach(p => p.modules.forEach(m => m.topics.forEach(t => allTopicIds.push(t.id))));
const TOTAL = allTopicIds.length;

function loadProgress() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) completed = JSON.parse(raw);
  } catch(e) { completed = {}; }
}

function saveProgress() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(completed)); } catch(e) {}
}

function toggleTopic(id) {
  if (completed[id]) delete completed[id];
  else completed[id] = Date.now();
  saveProgress();
  render();
}

function toggleAllInModule(mod) {
  const allDone = mod.topics.every(t => completed[t.id]);
  mod.topics.forEach(t => {
    if (allDone) delete completed[t.id];
    else if (!completed[t.id]) completed[t.id] = Date.now();
  });
  saveProgress();
  render();
}

function resetProgress() {
  if (!confirm("¿Borrar TODO tu progreso? No se puede deshacer.")) return;
  completed = {};
  try { localStorage.removeItem(STORAGE_KEY); } catch(e) {}
  render();
}

function getModProg(mod) {
  const d = mod.topics.filter(t => completed[t.id]).length;
  return { done: d, total: mod.topics.length, pct: Math.round((d / mod.topics.length) * 100) };
}

function getPhaseProg(phase) {
  let d = 0, t = 0;
  phase.modules.forEach(m => m.topics.forEach(tp => { t++; if (completed[tp.id]) d++; }));
  return { done: d, total: t, pct: t ? Math.round((d / t) * 100) : 0 };
}

function getTotalProg() {
  const d = Object.keys(completed).length;
  return { done: d, total: TOTAL, pct: Math.round((d / TOTAL) * 100) };
}

// ═══════════════════════════════════════
// RENDER
// ═══════════════════════════════════════
function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

function render() {
  const total = getTotalProg();
  const phase = PHASES.find(p => p.id === activePhase);

  let html = '';

  // HEADER
  html += `<div class="header"><div class="header-inner">
    <div class="header-top">
      <div>
        <div class="header-tag">CAREER://INFRASTRUCTURE</div>
        <h1>Senior Infrastructure Engineer</h1>
        <div class="header-sub">18 meses · Abr 2026 → Sep 2027 · ${TOTAL} temas · 72 semanas</div>
      </div>
      <div class="header-actions">
        <button class="btn-icon" onclick="showStats=!showStats;render();">${showStats ? '✕' : '📊'}</button>
        <button class="btn-reset" onclick="resetProgress()">reset</button>
      </div>
    </div>
    <div class="progress-bar-wrap">
      <div class="progress-labels">
        <span class="progress-label-left">progreso total</span>
        <span class="progress-label-right">${total.done}/${total.total} · ${total.pct}%</span>
      </div>
      <div class="progress-track">
        <div class="progress-fill ${total.pct > 0 && total.pct < 100 ? 'glowing' : ''}" style="width:${total.pct}%"></div>
      </div>
    </div>
  </div></div>`;

  // STATS
  if (showStats) {
    html += `<div class="stats-panel"><div class="stats-grid">`;
    PHASES.forEach(p => {
      const pr = getPhaseProg(p);
      html += `<div class="stat-card ${pr.pct === 100 ? 'complete' : ''}" style="--phase-color:${p.color}" onclick="activePhase='${p.id}';showStats=false;render();">
        <div class="stat-phase" style="color:${p.color}">FASE ${p.phase}</div>
        <div class="stat-pct">${pr.pct}%</div>
        <div class="stat-count">${pr.done}/${pr.total}</div>
        <div class="stat-bar"><div class="stat-bar-fill" style="width:${pr.pct}%;background:${p.color}"></div></div>
      </div>`;
    });
    html += `</div></div>`;
  }

  // TABS
  html += `<div class="tabs">`;
  PHASES.forEach(p => {
    const pr = getPhaseProg(p);
    const active = p.id === activePhase;
    html += `<button class="tab ${active ? 'active' : ''}" style="${active ? 'color:'+p.color+';border-bottom-color:'+p.color+';border-color:'+p.color+'44' : ''}" onclick="activePhase='${p.id}';expandedModule=null;render();">
      ${pr.pct === 100 ? '✓ ' : ''}F${p.phase}<span class="tab-pct">${pr.pct}%</span>
    </button>`;
  });
  html += `</div>`;

  // CONTENT
  html += `<div class="content">`;

  if (phase) {
    const pProg = getPhaseProg(phase);

    // Phase banner
    html += `<div class="phase-banner" style="border:1px solid ${phase.color}18">
      <div class="phase-banner-inner">
        <div>
          <div class="phase-title" style="color:${phase.color}">FASE ${phase.phase}: ${esc(phase.title)}</div>
          <div class="phase-sub">${esc(phase.months)} · ${phase.modules.length} módulos</div>
        </div>
        <div class="phase-badge" style="background:${phase.color}12;border:1px solid ${phase.color}28;color:${phase.color}">${pProg.done}/${pProg.total}</div>
      </div>
    </div>`;

    // Modules
    phase.modules.forEach(mod => {
      const prog = getModProg(mod);
      const isExp = expandedModule === mod.id;

      html += `<div class="module ${prog.pct === 100 ? 'complete' : ''}" style="--phase-color:${phase.color}">
        <button class="module-header" onclick="expandedModule=expandedModule==='${mod.id}'?null:'${mod.id}';render();">
          <span class="module-icon" style="filter:${prog.pct === 100 ? 'grayscale(0)' : 'grayscale(.3)'}">${mod.icon}</span>
          <div class="module-info">
            <div class="module-top">
              <div><span class="module-name">${esc(mod.title)}</span><span class="module-weeks">${esc(mod.weeks)}</span></div>
              <div style="display:flex;align-items:center">
                <span class="module-progress" style="color:${prog.pct === 100 ? '#00ff88' : phase.color}">${prog.pct === 100 ? '✓ ' : ''}${prog.done}/${prog.total}</span>
                <span class="module-arrow ${isExp ? 'open' : ''}">▼</span>
              </div>
            </div>
            <div class="module-bar"><div class="module-bar-fill" style="width:${prog.pct}%;background:${prog.pct === 100 ? '#00ff88' : phase.color}"></div></div>
          </div>
        </button>`;

      if (isExp) {
        html += `<div class="module-body">
          <div class="mark-all-row">
            <button class="btn-mark-all" style="border:1px solid ${phase.color}33;color:${phase.color}" onclick="event.stopPropagation();toggleAllModule('${mod.id}')">
              ${prog.pct === 100 ? 'desmarcar todo' : 'marcar todo ✓'}
            </button>
          </div>`;

        // Topics
        html += `<div class="section-box"><div class="section-label" style="color:${phase.color}">TEMAS</div>`;
        mod.topics.forEach(t => {
          const isDone = !!completed[t.id];
          html += `<div class="topic-row ${isDone ? 'done' : ''}" onclick="toggleTopic('${t.id}')">
            <div class="checkbox ${isDone ? 'checked' : ''}"></div>
            <span class="topic-text ${isDone ? 'done' : ''}">${esc(t.text)}</span>
          </div>`;
        });
        html += `</div>`;

        // Resources
        html += `<div class="section-box resources-box" style="--phase-color:${phase.color}"><div class="section-label" style="color:#fbbf24">RECURSOS GRATIS</div>`;
        mod.resources.forEach(r => {
          html += `<div class="resource-link"><a href="${esc(r.url)}" target="_blank" rel="noopener"><span class="resource-arrow">→</span>${esc(r.name)}</a></div>`;
        });
        html += `</div>`;

        // Project
        html += `<div class="section-box project-box"><div class="section-label" style="color:#00ff88">PROYECTO PRÁCTICO</div>
          <p class="project-text">${esc(mod.project)}</p>
        </div>`;

        html += `</div>`; // module-body
      }

      html += `</div>`; // module
    });
  }

  // Footer
  html += `<div class="footer"><div class="footer-text">built for emanuel · progreso guardado en este navegador</div></div>`;
  html += `</div>`; // content

  document.getElementById('app').innerHTML = html;
}

// Global helper for inline onclick
window.toggleAllModule = function(modId) {
  const phase = PHASES.find(p => p.modules.some(m => m.id === modId));
  if (!phase) return;
  const mod = phase.modules.find(m => m.id === modId);
  if (!mod) return;
  toggleAllInModule(mod);
};

// ═══════════════════════════════════════
// INIT
// ═══════════════════════════════════════
loadProgress();
render();
</script>
